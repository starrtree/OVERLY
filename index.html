<style>
*{box-sizing:border-box}html,body,#root{min-height:100%;margin:0}body{background:#050505;color:#fff;font-family:'Courier New',monospace;overflow:hidden}button{font-family:inherit}.fallback{position:fixed;inset:0;background:#000;z-index:9999}.fallback video{width:100%;height:100%;object-fit:cover}.skip,.enter{border:3px outset #fff;background:#c0c0c0;color:#000;padding:.75rem 1rem;font-weight:900}.skip{position:fixed;right:1rem;bottom:1rem;z-index:12}.desktop{position:fixed;inset:0;background:#000;overflow:hidden}.wall{position:absolute;inset:-3%;width:106%;height:106%;object-fit:cover;transform:scale(1.04);filter:saturate(1.15) contrast(1.05)}.scan{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.08) 0 1px,transparent 1px 4px),radial-gradient(circle,transparent 45%,rgba(0,0,0,.35));z-index:9}.bootOverlay{position:absolute;inset:0;display:grid;place-items:center;text-align:center;z-index:12;background:radial-gradient(circle,rgba(255,63,183,.22),transparent 36%),rgba(0,0,0,.18);backdrop-filter:blur(1px)}.bootOverlay h1{font-size:clamp(4rem,18vw,11rem);line-height:.85;margin:0;color:#ff3fb7;text-shadow:4px 4px #00eaff,-4px -4px #000;-webkit-text-stroke:3px #111}.bootOverlay h2{font-size:clamp(3rem,14vw,9rem);line-height:.9;margin:0;color:#c9ff3d;text-shadow:4px 4px #000}.icon{position:absolute;width:84px;background:transparent;border:1px solid transparent;color:#fff;text-shadow:2px 2px #000;font-size:12px;text-align:center;cursor:grab;touch-action:none;z-index:4}.icon:hover{border:1px dotted #fff;background:rgba(0,0,128,.35)}.icon img{width:58px;height:58px;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(2px 4px 0 rgba(0,0,0,.75))}.taskbar{position:absolute;left:0;right:0;bottom:0;height:42px;background:linear-gradient(#245edb,#0c3aa3 48%,#093081);color:#fff;border-top:1px solid #7bb7ff;display:flex;align-items:center;gap:6px;padding:4px 8px;z-index:10;box-shadow:0 -2px 8px rgba(0,0,0,.45)}.startBtn{height:32px;min-width:92px;border-radius:16px;border:1px solid #72d96b;background:linear-gradient(#5ee060,#168a19);color:#fff;font-weight:900;text-shadow:1px 1px #064f06}.taskItem,.dockIcon{height:31px;border:1px solid rgba(255,255,255,.42);background:linear-gradient(rgba(255,255,255,.26),rgba(255,255,255,.08));color:#fff;border-radius:4px;padding:0 10px;font-weight:900}.dockIcon{width:36px;padding:0;font-size:18px}.clock{margin-left:auto;border:1px inset rgba(255,255,255,.4);padding:6px 10px;font-size:12px;font-weight:900}.win{position:absolute;z-index:20;width:min(380px,88vw);background:#c0c0c0;color:#000;border:4px outset #fff;box-shadow:8px 8px rgba(0,0,0,.55)}.win.main{border-color:#ff9d28}.win.music{border-color:#75ff4c}.win.text{border-color:#6cf}.win.money{border-color:#ffe45b}.win.party{border-color:#ff3fb7}.win.sweet{border-color:#ff84d8}.win.links{border-color:#ffd700}.win.error{border-color:#ff2d2d}.win.ice{border-color:#f5c84c}.bar{color:#fff;height:30px;display:flex;justify-content:space-between;align-items:center;padding-left:8px;font-weight:900}.main .bar{background:linear-gradient(90deg,#6821b8,#ff7b00)}.music .bar{background:linear-gradient(90deg,#111,#39d915)}.text .bar{background:linear-gradient(90deg,#004b87,#00b7ff)}.money .bar{background:linear-gradient(90deg,#735900,#ffd700);color:#000}.party .bar,.sweet .bar{background:linear-gradient(90deg,#96005e,#ff3fb7)}.links .bar{background:linear-gradient(90deg,#004a9f,#00a0ff)}.error .bar{background:linear-gradient(90deg,#7a0000,#f00)}.ice .bar{background:linear-gradient(90deg,#5c4200,#f5c84c);color:#000}.bar button{height:22px;width:24px;border:2px outset #fff;background:#c0c0c0}.body{padding:15px}.body h2{margin:0 0 8px;font-size:22px}.body p{margin:0 0 12px;line-height:1.35}.body button{border:2px outset #fff;background:#c0c0c0;margin-right:6px}.phoneDock{display:none}@media(max-width:700px){.wall{inset:-8%;width:116%;height:116%;transform:scale(1.08)}.icon{width:72px;font-size:10px}.icon img{width:48px;height:48px}.win{left:6%!important;top:15%!important}.taskbar{height:70px;justify-content:center;background:rgba(255,255,255,.18);backdrop-filter:blur(14px);border-radius:26px;left:12px;right:12px;bottom:12px;border:1px solid rgba(255,255,255,.35)}.startBtn{min-width:48px;border-radius:14px;font-size:0}.startBtn:after{content:'⊞';font-size:24px}.taskItem{display:none}.clock{display:none}.dockIcon{height:46px;width:46px;border-radius:14px;font-size:24px;background:rgba(255,255,255,.26)}.bootOverlay{padding:18px}.bootOverlay h1{font-size:22vw}.bootOverlay h2{font-size:17vw}}
</style>
</head>
<body>
<div id="root"></div>
<div id="fallback" class="fallback"><video id="introVideo" autoplay muted playsinline><source src="/OVERLY/video/TimelessY2Kvideo.mp4" type="video/mp4" /></video><button class="skip" id="skipIntro">skip intro</button></div>
<script>
(function(){
var base='/OVERLY/',iconsPath=base+'icons/',rawIconsPath=base+'public/icons/';
var fallback=document.getElementById('fallback'),video=document.getElementById('introVideo'),skip=document.getElementById('skipIntro');
var icons=[['Timeless.exe','TimelessPopupICON.PNG',5,7,'main'],['MySpace.url','TimelessPopupICON.PNG',5,22,'links'],['Y2K_Mix.mp3','mp3ICON.PNG',5,37,'music'],['RSVP.txt','nokiaOpenICON.PNG',5,52,'text','nokiaClosedICON.PNG'],['Cover.zip','moneyBagICON.PNG',5,67,'money'],['Party_Mode','redSoloICON.PNG',17,7,'party'],['Kiss.gif','lipsICON.PNG',17,22,'kiss'],['Star.exe','starICON.PNG',17,37,'jump'],['Sweet.exe','suckerICON.PNG',17,52,'pop'],['Candy_Lips','lipsWsuckerICON.PNG',17,67,'sweet'],['Ice.png','earingsICON.PNG',29,7,'ice'],['Links.url','goldLinkICON.PNG',29,22,'links'],['Missed_Call','nokiaClosedICON.PNG',29,37,'error']];
var copy={main:['TLN Program Manager','OVERLY 2000s','A retro Y2K party experience by TIMELESS No Limit LLC. Date, time, location, RSVP link, and ticket link go here.'],music:['Winamp 2000','Y2K_Mix.mp3','Drop your intro song into /public/audio/intro-song.mp3.'],text:['Nokia Message Center','NEW TEXT MESSAGE','u outside? OVERLY 2000s is loading. Pull up in your best throwback fit.'],money:['Cover.zip','VIP FILE FOUND','Ticket and cover info can live here.'],party:['Party_Mode.exe','SYSTEM PARTY MODE ENABLED','Nostalgia levels too high. Glitter and scanlines activated.'],sweet:['Candy_Lips.exe','SWEET ENTRY UNLOCKED','A hidden popup for promo codes, RSVP perks, or a secret message.'],links:['Internet Explorer','TIMELESS LINKS','Instagram, tickets, RSVP, location, and MySpace-era promo links can live here.'],error:['ERROR 2000','MISSED CALL FROM 2003','Your flip phone is vibrating. OVERLY.exe cannot be ignored.'],ice:['Ice Detector','TOO MUCH DRIP DETECTED','System brightness has been increased by 2000%.']};
function beep(type){try{var C=window.AudioContext||window.webkitAudioContext,c=new C(),o=c.createOscillator(),g=c.createGain();o.frequency.value=type==='error'?160:type==='sparkle'?880:520;o.type=type==='error'?'square':'triangle';g.gain.value=.05;g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.14);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.15)}catch(e){}}
function shell(withBoot){fallback&&fallback.remove();var d=document.createElement('main');d.className='desktop';d.innerHTML='<img class="wall" src="'+base+'TimelessY2KWallpaper.jpg" onerror="this.src=\''+base+'public/TimelessY2KWallpaper.jpg\'"/><div class="scan"></div><footer class="taskbar"><button class="startBtn" id="start">START</button><button class="dockIcon" title="File Explorer">📁</button><button class="dockIcon" title="Chrome">🌐</button><button class="dockIcon" title="Calculator">🧮</button><button class="dockIcon" title="MySpace">⭐</button><button class="taskItem">OVERLY 2000s</button><button class="taskItem">Timeless.exe</button><span class="clock">'+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})+'</span></footer>';document.body.appendChild(d);if(withBoot){var b=document.createElement('div');b.className='bootOverlay';b.innerHTML='<div><div>TIMELESS NO LIMIT PRESENTS</div><h1>OVERLY</h1><h2>2000s</h2><p>Y2K desktop experience initialized.</p><button class="enter">ENTER OVERLY.exe</button></div>';d.appendChild(b);b.querySelector('button').onclick=function(){beep('sparkle');b.remove();loadIcons(d)}}else loadIcons(d);d.querySelector('#start').onclick=function(){popup('main')}}
function loadIcons(d){icons.forEach(function(it){var btn=document.createElement('button');btn.className='icon';btn.style.left=it[2]+'%';btn.style.top=it[3]+'%';btn.innerHTML='<img src="'+iconsPath+it[1]+'"><div>'+it[0]+'</div>';var img=btn.querySelector('img');img.onerror=function(){img.onerror=null;img.src=rawIconsPath+(it[5]||it[1])};makeDrag(btn,function(){act(it[4],btn)});d.appendChild(btn)})}
function act(type,el){beep(type==='error'?'error':'click');if(type==='jump'){el.style.left=(5+Math.random()*34)+'%';el.style.top=(8+Math.random()*65)+'%';return}if(type==='kiss'){var k=document.createElement('div');k.style.cssText='position:absolute;left:'+(10+Math.random()*75)+'%;top:'+(15+Math.random()*55)+'%;z-index:15;font-size:60px;filter:drop-shadow(4px 4px #000)';k.textContent='💋';document.body.appendChild(k);return}popup(type)}
function popup(type){var c=copy[type]||copy.main,w=document.createElement('div');w.className='win '+type;w.style.left=(38+Math.random()*25)+'%';w.style.top=(13+Math.random()*38)+'%';w.innerHTML='<div class="bar"><span>'+c[0]+'</span><button>×</button></div><div class="body"><h2>'+c[1]+'</h2><p>'+c[2]+'</p><button>OK</button><button>Cancel</button></div>';w.querySelector('.bar button').onclick=function(){w.remove()};w.querySelector('.body button').onclick=function(){w.remove()};makeDrag(w);document.body.appendChild(w)}
function makeDrag(el,click){var sx,sy,l,t,moved=false;el.onpointerdown=function(e){sx=e.clientX;sy=e.clientY;l=parseFloat(el.style.left)||0;t=parseFloat(el.style.top)||0;moved=false;el.setPointerCapture(e.pointerId)};el.onpointermove=function(e){if(sx==null)return;var dx=(e.clientX-sx)/innerWidth*100,dy=(e.clientY-sy)/innerHeight*100;if(Math.abs(dx)+Math.abs(dy)>.8)moved=true;el.style.left=Math.max(1,Math.min(90,l+dx))+'%';el.style.top=Math.max(5,Math.min(80,t+dy))+'%'};el.onpointerup=function(){sx=null;if(!moved&&click)click()}}
video.onended=function(){shell(true)};video.onerror=function(){shell(true)};skip.onclick=function(){shell(true)};setTimeout(function(){if(fallback&&document.body.contains(fallback)&&video.readyState===0)shell(true)},2500);
})();
</script>
