<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OVERLY 2000s | TIMELESS No Limit</title>
    <meta name="description" content="OVERLY 2000s, a retro Y2K desktop experience by TIMELESS No Limit LLC." />
    <style>
      *{box-sizing:border-box}html,body,#root{min-height:100%;margin:0}body{background:#050505;color:#fff;font-family:'Courier New',monospace;overflow:hidden}.fallback{position:fixed;inset:0;background:#000;z-index:9999}.fallback video{width:100%;height:100%;object-fit:cover}.skip,.enter{position:fixed;z-index:10;border:3px outset #fff;background:#c0c0c0;color:#000;padding:.75rem 1rem;font-weight:900;font-family:inherit}.skip{right:1rem;bottom:1rem}.enter{left:50%;top:50%;transform:translate(-50%,-50%)}.desktop{position:fixed;inset:0;background:#000;overflow:hidden}.wall{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.scan{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.08) 0 1px,transparent 1px 4px),radial-gradient(circle,transparent 45%,rgba(0,0,0,.35));z-index:9}.icon{position:absolute;width:82px;background:transparent;border:1px solid transparent;color:#fff;text-shadow:2px 2px #000;font-size:12px;text-align:center;cursor:grab;touch-action:none}.icon:hover{border:1px dotted #fff;background:rgba(0,0,128,.35)}.icon img{width:58px;height:58px;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(2px 4px 0 rgba(0,0,0,.75))}.taskbar{position:absolute;left:0;right:0;bottom:0;height:36px;background:#c0c0c0;color:#000;border-top:3px outset #fff;display:flex;align-items:center;gap:5px;padding:4px;z-index:10}.taskbar button{border:2px outset #fff;background:#c0c0c0;font-family:inherit;font-weight:900}.taskbar span{margin-left:auto;font-size:12px;font-weight:900}.win{position:absolute;z-index:20;width:min(360px,86vw);background:#c0c0c0;color:#000;border:3px outset #fff;box-shadow:8px 8px rgba(0,0,0,.55)}.bar{background:linear-gradient(90deg,#000080,#1084d0);color:#fff;height:28px;display:flex;justify-content:space-between;align-items:center;padding-left:8px;font-weight:900}.bar button{height:21px;width:24px;border:2px outset #fff;background:#c0c0c0}.body{padding:15px}.body h2{margin:0 0 8px;font-size:22px}.body p{margin:0 0 12px;line-height:1.35}.body button{border:2px outset #fff;background:#c0c0c0;margin-right:6px;font-family:inherit}.boot{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle,rgba(255,63,183,.2),transparent 35%),#02020a;text-align:center;z-index:9998}.boot h1{font-size:clamp(4rem,18vw,11rem);line-height:.85;margin:0;color:#ff3fb7;text-shadow:4px 4px #00eaff,-4px -4px #000;-webkit-text-stroke:3px #111}.boot h2{font-size:clamp(3rem,14vw,9rem);line-height:.9;margin:0;color:#c9ff3d;text-shadow:4px 4px #000}@media(max-width:700px){.icon{width:70px;font-size:11px}.icon img{width:48px;height:48px}.win{left:7%!important;top:16%!important}}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="fallback" class="fallback">
      <video id="introVideo" autoplay muted playsinline>
        <source src="/OVERLY/video/TimelessY2Kvideo.mp4" type="video/mp4" />
        <source src="/OVERLY/public/video/TimelessY2Kvideo.mp4" type="video/mp4" />
      </video>
      <button class="skip" id="skipIntro">skip intro</button>
    </div>
    <script>
      (function(){
        var base='/OVERLY/';
        var iconsPath=base+'icons/';
        var rawIconsPath=base+'public/icons/';
        var fallback=document.getElementById('fallback');
        var video=document.getElementById('introVideo');
        var skip=document.getElementById('skipIntro');
        var icons=[['Timeless.exe','TimelessPopupICON.PNG',7,10,'main'],['Y2K_Mix.mp3','mp3ICON.PNG',22,12,'music'],['RSVP.txt','nokiaOpenICON.PNG',37,12,'text','nokiaClosedICON.PNG'],['Cover.zip','moneyBagICON.PNG',52,12,'money'],['Party_Mode','redSoloICON.PNG',67,12,'party'],['Kiss.gif','lipsICON.PNG',82,12,'kiss'],['Star.exe','starICON.PNG',12,38,'jump'],['Sweet.exe','suckerICON.PNG',28,39,'pop'],['Candy_Lips','lipsWsuckerICON.PNG',45,39,'sweet'],['Ice.png','earingsICON.PNG',62,39,'ice'],['Links.url','goldLinkICON.PNG',78,39,'links'],['Missed_Call','nokiaClosedICON.PNG',16,65,'error']];
        var copy={main:['TLN Program Manager','OVERLY 2000s','A retro Y2K party experience by TIMELESS No Limit LLC. Date, time, location, RSVP link, and ticket link go here.'],music:['Winamp 2000','Y2K_Mix.mp3','Drop your intro song into /public/audio/intro-song.mp3.'],text:['Nokia Message Center','NEW TEXT MESSAGE','u outside? OVERLY 2000s is loading. Pull up in your best throwback fit.'],money:['Cover.zip','VIP FILE FOUND','Ticket and cover info can live here.'],party:['Party_Mode.exe','SYSTEM PARTY MODE ENABLED','Nostalgia levels too high. Glitter and scanlines activated.'],sweet:['Candy_Lips.exe','SWEET ENTRY UNLOCKED','A hidden popup for promo codes, RSVP perks, or a secret message.'],links:['Internet Explorer','TIMELESS LINKS','Add Instagram, ticket, RSVP, and location links here.'],error:['ERROR 2000','MISSED CALL FROM 2003','Your flip phone is vibrating. OVERLY.exe cannot be ignored.'],ice:['Ice Detector','TOO MUCH DRIP DETECTED','System brightness has been increased by 2000%.']};
        function beep(type){try{var C=window.AudioContext||window.webkitAudioContext;var c=new C();var o=c.createOscillator();var g=c.createGain();o.frequency.value=type==='error'?160:type==='sparkle'?880:520;o.type=type==='error'?'square':'triangle';g.gain.value=.05;g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.14);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.15)}catch(e){}}
        function boot(){fallback.remove();var b=document.createElement('div');b.className='boot';b.innerHTML='<div><div>TIMELESS NO LIMIT PRESENTS</div><h1>OVERLY</h1><h2>2000s</h2><p>Y2K desktop experience initialized.</p><button class="enter">ENTER OVERLY.exe</button></div>';document.body.appendChild(b);b.querySelector('button').onclick=function(){beep('sparkle');b.remove();desktop()}}
        function desktop(){var d=document.createElement('main');d.className='desktop';d.innerHTML='<img class="wall" src="'+base+'TimelessY2KWallpaper.jpg" onerror="this.src=\''+base+'public/TimelessY2KWallpaper.jpg\'"/><div class="scan"></div><footer class="taskbar"><button id="start">START</button><button>OVERLY 2000s</button><span>TIMELESS No Limit LLC</span></footer>';document.body.appendChild(d);icons.forEach(function(it){var btn=document.createElement('button');btn.className='icon';btn.style.left=it[2]+'%';btn.style.top=it[3]+'%';btn.innerHTML='<img src="'+iconsPath+it[1]+'"><div>'+it[0]+'</div>';var img=btn.querySelector('img');img.onerror=function(){img.onerror=null;img.src=rawIconsPath+(it[5]||it[1])};makeDrag(btn,function(){act(it[4],btn)});d.appendChild(btn)});d.querySelector('#start').onclick=function(){popup('main')}}
        function act(type,el){beep(type==='error'?'error':'click');if(type==='jump'){el.style.left=(5+Math.random()*84)+'%';el.style.top=(10+Math.random()*65)+'%';return}if(type==='kiss'){var k=document.createElement('div');k.style.cssText='position:absolute;left:'+(10+Math.random()*80)+'%;top:'+(15+Math.random()*60)+'%;z-index:15;font-size:60px;filter:drop-shadow(4px 4px #000)';k.textContent='💋';document.body.appendChild(k);return}popup(type)}
        function popup(type){var c=copy[type]||copy.main;var w=document.createElement('div');w.className='win';w.style.left=(12+Math.random()*42)+'%';w.style.top=(12+Math.random()*42)+'%';w.innerHTML='<div class="bar"><span>'+c[0]+'</span><button>×</button></div><div class="body"><h2>'+c[1]+'</h2><p>'+c[2]+'</p><button>OK</button><button>Cancel</button></div>';w.querySelector('.bar button').onclick=function(){w.remove()};w.querySelector('.body button').onclick=function(){w.remove()};makeDrag(w);document.body.appendChild(w)}
        function makeDrag(el,click){var sx,sy,l,t,moved=false;el.onpointerdown=function(e){sx=e.clientX;sy=e.clientY;l=parseFloat(el.style.left)||0;t=parseFloat(el.style.top)||0;moved=false;el.setPointerCapture(e.pointerId)};el.onpointermove=function(e){if(sx==null)return;var dx=(e.clientX-sx)/innerWidth*100,dy=(e.clientY-sy)/innerHeight*100;if(Math.abs(dx)+Math.abs(dy)>.8)moved=true;el.style.left=Math.max(1,Math.min(90,l+dx))+'%';el.style.top=Math.max(5,Math.min(80,t+dy))+'%'};el.onpointerup=function(){sx=null;if(!moved&&click)click()}}
        video.onended=boot;video.onerror=boot;skip.onclick=boot;setTimeout(function(){if(fallback&&document.body.contains(fallback)&&video.readyState===0)boot()},2500);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
