(function(){

var fallback=document.getElementById('fallback'),video=document.getElementById('introVideo'),skip=document.getElementById('skipIntro');
var ebayImages=['babyPhat_jeans.jpg','babyPhat_nokia.webp','babyhat_velour_tracksuit_women.webp','babyPhat_womens_top.jpg','FUBU_ad.webp','FUBU_bluejersey.webp','FUBU_red05.jpg','FUBU_womanmodel.jpg','Inspo1.jpg','mensjerseys_inspo1.jpg','mensjerseys_inspo2.jpg','rocawear_1.png','rocawear_jacket.jpg','rocawear_jeans.jpg','Rocawear_Models.jpg','rocawear_woman.png','Vocal_Nelly.jpg','womens_inspo1.jpg','womens_inspo2.jpg','womens_inspo3.jpg','womens_inspo4 (bandanas).jpg','womens_inspo5.jpg','womens_inspo6.jpg','babyhat_velour_tracksuit_women2.webp'];
var icons=[['Timeless.exe','TimelessPopupICON.PNG',5,7,'main'],['Performances','starICON.PNG',5,22,'performance'],['DJ Mix CD','cd_audio.png',5,37,'cd'],['RSVP Phone','nokiaClosedICON.PNG',5,52,'phone','nokiaOpenICON.PNG'],['2000s Closet','search_directory-0.png',5,67,'ebay'],['Party Mode','redSoloICON.PNG',17,7,'party'],['Kiss Cam','lipsICON.PNG',17,22,'kiss'],['Candy Lips','lipsWsuckerICON.PNG',17,37,'sweet'],['Cover.zip','moneyBagICON.PNG',17,52,'money'],['eBay Fits','directory_net_web-4.png',17,67,'ebay'],['Baby Phat','babyPhat_jeans.jpg',29,7,'ebay','',true],['FUBU Jerseys','FUBU_red05.jpg',29,22,'ebay','',true],['Rocawear','rocawear_jacket.jpg',29,37,'ebay','',true],['MySpace.url','msn-3.png',29,52,'links'],['Error 2000','msg_error-0.png',29,67,'error']];
var copy={main:['TLN Program Manager','OVERLY 2000s','A retro Y2K party experience by TIMELESS No Limit LLC. Date, time, location, RSVP link, and ticket link go here.'],performance:['Star.exe','LIVE PERFORMANCES','Performances by 2 stellar upcoming artists: Max Starr & special guest. Activated snippet loading...'],music:['CD Audio Player','OVERLY 2000s TEASE MIX','The throwback mix is loading. Drop Overly2000sTeaseMix.mp3 into /public/audio/ when ready.'],text:['Nokia Message Center','PHONE OPENED','RSVP line unlocked. Pull up in your best throwback fit.'],money:['Cover.zip','VIP FILE FOUND','Ticket and cover info can live here.'],party:['Party_Mode.exe','SYSTEM PARTY MODE ENABLED','Nostalgia levels too high. Glitter and scanlines activated.'],sweet:['Candy_Lips.exe','SWEET ENTRY UNLOCKED','A hidden popup for promo codes, RSVP perks, or a secret message.'],links:['Internet Explorer','TIMELESS LINKS','Instagram, tickets, RSVP, location, and MySpace-era promo links can live here.'],error:['ERROR 2000','MISSED CALL FROM 2003','Your flip phone is vibrating. OVERLY.exe cannot be ignored.'],ice:['Ice Detector','TOO MUCH DRIP DETECTED','System brightness has been increased by 2000%.']};
function beep(type){try{var C=window.AudioContext||window.webkitAudioContext,c=new C(),o=c.createOscillator(),g=c.createGain();o.frequency.value=type==='error'?160:type==='sparkle'?880:520;o.type=type==='error'?'square':'triangle';g.gain.value=.05;g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.14);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.15)}catch(e){}}

function iconSrc(it){if(it[6])return imgPath+it[1];if(it[1].indexOf('.png')>-1&&['cd_audio.png','search_directory-0.png','directory_net_web-4.png','msn-3.png','msg_error-0.png'].indexOf(it[1])>-1)return win98+it[1];return iconsPath+it[1]}
function fallbackSrc(it){if(it[5])return it[6]?imgPath+it[5]:iconsPath+it[5];return win98+'application_hourglass_small-4.png'}
function loadIcons(d){icons.forEach(function(it){var btn=document.createElement('button');btn.className='icon '+(it[6]?'photo':'');btn.style.left=it[2]+'%';btn.style.top=it[3]+'%';btn.innerHTML='<img src="'+iconSrc(it)+'"><div>'+it[0]+'</div>';var img=btn.querySelector('img');img.onerror=function(){img.onerror=null;img.src=fallbackSrc(it)};makeDrag(btn,function(){act(it[4],btn,it)});d.appendChild(btn)})}
function act(type,el,it){beep(type==='error'?'error':'click');if(type==='phone'){var img=el.querySelector('img');img.src=iconsPath+(it[5]||'nokiaOpenICON.PNG');return}if(type==='performance'){play('Activated(snippet).mp3');popup('performance');return}if(type==='cd'){play('Overly2000sTeaseMix.mp3');popup('music');return}if(type==='ebay'){ebayPopup();return}if(type==='kiss'){var k=document.createElement('div');k.style.cssText='position:absolute;left:'+(10+Math.random()*75)+'%;top:'+(15+Math.random()*55)+'%;z-index:15;font-size:60px;filter:drop-shadow(4px 4px #000)';k.textContent='💋';document.body.appendChild(k);return}popup(type)}
function popup(type){var c=copy[type]||copy.main,w=document.createElement('div');w.className='win '+type;w.style.left=(38+Math.random()*25)+'%';w.style.top=(13+Math.random()*38)+'%';w.innerHTML='<div class="bar"><span>'+c[0]+'</span><button>×</button></div><div class="body"><h2>'+c[1]+'</h2><p>'+c[2]+'</p><button>OK</button><button>Cancel</button></div>';w.querySelector('.bar button').onclick=function(){w.remove()};w.querySelector('.body button').onclick=function(){w.remove()};makeDrag(w);document.body.appendChild(w)}
function ebayPopup(){var w=document.createElement('div');w.className='win ebay';w.style.left='34%';w.style.top='10%';var cards=ebayImages.map(function(f,i){var title=f.replace(/\.(jpg|jpeg|png|webp)$/i,'').replaceAll('_',' ').replaceAll('-',' ');return '<div class="item"><img src="'+imgPath+f+'"><b>'+title+'</b><div class="price">Y2K fit inspo</div><small>OVERLY 2000s closet reference</small></div>'}).join('');w.innerHTML='<div class="bar"><span>Internet Explorer - eBay OVERLY Closet</span><button>×</button></div><div class="ebayPage"><div class="ebayHead"><div class="ebayLogo"><span>e</span><span>b</span><span>a</span><span>y</span></div><div class="ebaySearch"><input value="baby phat fubu rocawear 2000s party outfits"><button>Search</button></div></div><div class="grid">'+cards+'</div></div>';w.querySelector('.bar button').onclick=function(){w.remove()};makeDrag(w);document.body.appendChild(w)}
function makeDrag(el,click){var sx,sy,l,t,moved=false;el.onpointerdown=function(e){if(e.target.closest&&e.target.closest('.ebayPage'))return;sx=e.clientX;sy=e.clientY;l=parseFloat(el.style.left)||0;t=parseFloat(el.style.top)||0;moved=false;el.setPointerCapture(e.pointerId)};el.onpointermove=function(e){if(sx==null)return;var dx=(e.clientX-sx)/innerWidth*100,dy=(e.clientY-sy)/innerHeight*100;if(Math.abs(dx)+Math.abs(dy)>.8)moved=true;el.style.left=Math.max(1,Math.min(90,l+dx))+'%';el.style.top=Math.max(5,Math.min(80,t+dy))+'%'};el.onpointerup=function(){sx=null;if(!moved&&click)click()}}
video.onended=function(){shell(true)};video.onerror=function(){shell(true)};skip.onclick=function(){shell(true)};setTimeout(function(){if(fallback&&document.body.contains(fallback)&&video.readyState===0)shell(true)},2500);
})();
